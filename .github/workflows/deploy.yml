name: Deploy LogInsight

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # Build and push docker image
    - name: Build and Push
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/log-insight:${{ github.sha }} .
        docker push ${{ secrets.DOCKER_USERNAME }}/log-insight:${{ github.sha }}

    - name: Debug env
      run: |
        docker run --rm -e S3_BUCKET=${{ secrets.S3_BUCKET }} -e AWS_REGION=${{ secrets.AWS_REGION }} alpine env | grep -E 'S3_BUCKET|AWS_REGION'


    # Deploy to EC2 via SSH
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.2.5
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/log-insight:${{ github.sha }}
          docker stop log-insight || true
          docker rm log-insight || true
          docker run -d -p 80:8000 -e S3_BUCKET=${{ secrets.S3_BUCKET }} -e AWS_REGION=${{ secrets.AWS_REGION }} --name log-insight ${{ secrets.DOCKER_USERNAME }}/log-insight:${{ github.sha }}