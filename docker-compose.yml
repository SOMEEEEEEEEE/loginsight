version: '3.9'

services:
  log-insight:
    build: .
    container_name: log-insight
    ports:
      - "8000:8000"

  nginx:
    image: nginx:latest
    container_name: loginsight-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - log-insight